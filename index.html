<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易經生活智慧導航：深度指引版</title>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --primary: #2c3e50;    /* 深色文字 */
            --accent: #c0392b;     /* 吉祥紅 */
            --indigo: #283593;     /* 靛藍色 */
            --family: #2e7d32;     /* 溫暖綠 */
            --work: #1565c0;       /* 專業藍 */
            --gold: #fbc02d;       /* 變爻金 */
            --tag-bg: #fff3e0;     /* 標籤底色 */
            --tag-text: #e65100;   /* 標籤文字 */
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            
            /* 卦象專用配色 */
            --yang-color: #c0392b; /* 陽爻：紅 */
            --yin-color: #1a1a1a;  /* 陰爻：黑 */
        }

        body {
            margin: 0; padding: 0;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: var(--bg-color); color: #333;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }

        /* --- 導航與標題 --- */
        .app-header { text-align: center; margin-bottom: 30px; padding: 20px 0; }
        .app-title { font-size: 2.2rem; margin: 0; color: var(--primary); letter-spacing: 2px; }
        .app-subtitle { color: #666; margin-top: 10px; font-weight: normal; }

        /* --- 頁面切換 --- */
        .page-section { display: none; animation: fadeIn 0.4s ease; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 首頁按鈕 --- */
        .home-menu { display: grid; gap: 20px; margin-top: 40px; justify-content: center; }
        .big-btn {
            background: #fff; padding: 20px 40px; border-radius: 50px;
            font-size: 1.2rem; border: none; cursor: pointer;
            box-shadow: var(--shadow); transition: 0.3s;
            display: flex; align-items: center; gap: 15px; font-weight: bold;
            color: var(--primary);
        }
        .big-btn.primary { background: var(--accent); color: #fff; }
        .big-btn:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }

        /* 引導區 */
        .guide-box { margin-bottom: 30px; text-align: center;}
        .guide-label { font-weight: bold; color: var(--indigo); margin-bottom: 15px; display: block; }
        .guide-chips { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .chip {
            padding: 8px 20px; background: #e8eaf6; color: var(--indigo); border-radius: 20px;
            cursor: pointer; font-size: 0.95rem; transition: 0.2s; border: 1px solid transparent;
        }
        .chip:hover, .chip.selected { background: var(--indigo); color: white; transform: translateY(-2px); }
        .intent-text { 
            font-size: 1.1rem; color: #555; font-style: italic; min-height: 1.5em; 
            margin-bottom: 30px; padding: 15px; background: #fff; border-radius: 10px; box-shadow: var(--shadow);
        }

        /* --- 起卦介面 --- */
        .divination-card { background: #fff; padding: 40px; border-radius: 24px; text-align: center; box-shadow: var(--shadow); }
        .coins-area { display: flex; justify-content: center; gap: 15px; margin: 40px 0; perspective: 1000px; }
        .coin {
            width: 80px; height: 80px; border-radius: 50%;
            background: #ffd54f; border: 5px solid #ffca28;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: #b7950b; font-weight: bold;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1), 0 5px 10px rgba(0,0,0,0.1);
            transition: transform 0.6s;
        }
        .coin.tail { background: #cfd8dc; border-color: #b0bec5; color: #78909c; }
        .coin.flipping { animation: flip 0.6s ease-in-out infinite; }
        @keyframes flip { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }

        .progress-track { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-top: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }

        /* --- 導航列 --- */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-back {
            background: #e0e0e0; border: none; padding: 12px 32px; border-radius: 40px;
            cursor: pointer; font-weight: bold; color: #444; font-size: 1.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.2s;
        }
        .btn-back:hover { background: #d0d0d0; transform: scale(1.05); }
        
        /* --- 結果詳解 --- */
        .result-title-box { text-align: center; margin-bottom: 30px; }
        .gua-badge { display: inline-block; background: var(--primary); color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 0.9rem; margin-bottom: 10px; }
        
        .indigo-char { color: var(--indigo); }
        .red-char { color: var(--accent); }
        .hex-symbol-lg { color: var(--accent); font-size: 1.3em; margin: 0 10px; vertical-align: middle; }

        /* 吉凶與結構 */
        .meta-box { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .luck-badge {
            background: var(--tag-bg); color: var(--tag-text); padding: 8px 20px;
            border-radius: 30px; font-weight: bold; display: flex; align-items: center; gap: 8px;
            font-size: 1.2rem; border: 2px solid #ffe0b2;
        }
        
        .structure-box {
            display: flex; gap: 20px; align-items: center; justify-content: center;
            background: #fff; padding: 15px; border-radius: 15px; box-shadow: var(--shadow);
            margin-bottom: 25px;
        }
        .trigram-item { text-align: center; }
        .trigram-icon { font-size: 2rem; line-height: 1; color: var(--primary); display: block; }
        .trigram-name { font-size: 0.85rem; color: #666; }

        /* 內容卡片 */
        .info-card {
            background: #fff; padding: 25px; border-radius: 16px; margin-bottom: 20px;
            box-shadow: var(--shadow); border-left: 5px solid transparent;
        }
        .info-card.gen { border-color: var(--primary); }
        .info-card.fam { border-color: var(--family); background: #f1f8e9; }
        .info-card.work { border-color: var(--work); background: #e3f2fd; }

        /* 列表樣式優化 */
        .detail-list { padding-left: 20px; margin: 5px 0; }
        .detail-list li { margin-bottom: 8px; line-height: 1.6; }
        .highlight-text { font-weight: bold; color: var(--family); }

        .card-label { font-weight: bold; margin-bottom: 10px; display: block; display: flex; align-items: center; gap: 8px; font-size: 1.1rem; }
        .card-content { line-height: 1.8; color: #444; text-align: justify; }

        /* 互動圖形 */
        .visual-box {
            display: flex; justify-content: center; gap: 40px; margin: 30px 0;
            background: #fff; padding: 20px; border-radius: 16px; box-shadow: var(--shadow);
        }
        .hex-col { display: flex; flex-direction: column; gap: 8px; cursor: pointer; }
        .line { width: 140px; height: 18px; border-radius: 4px; position: relative; transition: 0.2s; }
        .line.yang { background: var(--yang-color); }
        .line.yin { background: linear-gradient(90deg, var(--yin-color) 42%, transparent 42%, transparent 58%, var(--yin-color) 58%); }
        .line.moving::after {
            content: '●'; position: absolute; right: -25px; top: -5px; color: var(--gold); font-size: 1.2rem;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* 爻辭列表 */
        .yao-list { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
        .yao-item { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; transition: 0.3s; }
        .yao-item.active { background: #fffde7; border-left: 5px solid var(--gold); }
        .yao-title { font-weight: bold; color: var(--primary); margin-bottom: 5px; display: block; }
        .yao-tip { display: inline-block; background: var(--accent); color: #fff; font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; margin-top: 8px; }

        /* 瀏覽列表 */
        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding-bottom: 40px; }
        .lib-item {
            background: #fff; padding: 15px 10px; text-align: center; border-radius: 12px; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; border: 1px solid transparent;
            display: flex; flex-direction: column; align-items: center;
        }
        .lib-item:hover { transform: translateY(-3px); border-color: var(--work); }
        
        .mini-hex-container { display: flex; flex-direction: column-reverse; gap: 3px; margin-bottom: 10px; }
        .mini-line { width: 40px; height: 4px; border-radius: 2px; }
        .mini-line.yang { background: var(--yang-color); }
        .mini-line.yin { background: linear-gradient(90deg, var(--yin-color) 40%, transparent 40%, transparent 60%, var(--yin-color) 60%); }

        .lib-name { font-weight: bold; font-size: 1.1rem; color: var(--primary); }
        .hex-symbol-sm { color: var(--accent); font-size: 1.8rem; line-height: 1; display: inline-block; margin: 0 5px; vertical-align: sub; }

        /* 搜尋框 */
        .search-input {
            width: 100%; padding: 12px; border-radius: 30px; border: 1px solid #ddd;
            margin-bottom: 20px; outline: none; text-align: center; font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="app-header">
        <h1 class="app-title">易經生活智慧導航</h1>
        <div class="app-subtitle">全六十四卦完整版 • 深度家人指引 • 吉凶詳解</div>
    </div>

    <div id="viewHome" class="page-section active">
        
        <div class="guide-box">
            <span class="guide-label">💡 請問您想問什麼方向？</span>
            <div class="guide-chips">
                <div class="chip" onclick="setIntent('近期運勢')">近期運勢</div>
                <div class="chip" onclick="setIntent('工作轉職')">工作轉職</div>
                <div class="chip" onclick="setIntent('家庭關係')">家庭關係</div>
                <div class="chip" onclick="setIntent('投資決策')">投資決策</div>
                <div class="chip" onclick="setIntent('感情發展')">感情發展</div>
            </div>
            <div id="intentText" class="intent-text">請專注默念您的問題，心誠則靈...</div>
        </div>

        <div class="home-menu">
            <button class="big-btn primary" onclick="startDivination()">
                <span>🎲 開始線上起卦</span>
            </button>
            <button class="big-btn" onclick="showLibrary()">
                <span>📚 瀏覽全卦象</span>
            </button>
        </div>
    </div>

    <div id="viewDivination" class="page-section">
        <div class="nav-bar">
            <button class="btn-back" onclick="goHome()">← 取消</button>
            <div style="font-weight:bold; font-size:1.2rem;">線上排盤</div>
            <div style="width:80px;"></div>
        </div>

        <div class="divination-card">

            <p style="color:#666;">請默念您的問題，然後點擊「擲硬幣」</p>

            <div class="coins-area">
                <div class="coin" id="c1">?</div>
                <div class="coin" id="c2">?</div>
                <div class="coin" id="c3">?</div>
            </div>

            <button class="big-btn primary" style="margin: 0 auto;" id="tossBtn" onclick="toss()">
                擲硬幣
            </button>
            
            <div class="progress-track">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div id="tossResultText" style="margin-top:20px; font-weight:bold; color:var(--accent); min-height: 24px;"></div>
        </div>
    </div>

    <div id="viewResult" class="page-section">
        <div class="nav-bar">
            <button class="btn-back" onclick="goBackFromDetail()">← 返回</button>
            <div style="font-weight:bold; font-size:1.2rem;">卦象詳解</div>
            <div style="width:80px;"></div>
        </div>

        <div class="result-title-box">
            <span class="gua-badge" id="rId">--</span>
            <div class="meta-box" id="rTags"></div>
            <h1 id="rTitle" style="font-size: 2.5rem; margin: 10px 0; color: var(--primary);">--</h1>
            <div id="rSub" style="font-size: 1.2rem; color: #666;">--</div>
        </div>

        <div class="structure-box">
            <div class="trigram-item">
                <span class="trigram-icon" id="upperIcon">☰</span>
                <div class="trigram-name" id="upperName">上卦(天)</div>
            </div>
            <div style="font-size:1.5rem; color:#ccc;">+</div>
            <div class="trigram-item">
                <span class="trigram-icon" id="lowerIcon">☴</span>
                <div class="trigram-name" id="lowerName">下卦(風)</div>
            </div>
        </div>

        <div class="info-card gen">
            <span class="card-label" style="color:var(--primary);">📖 白話總解</span>
            <div id="rGen" class="card-content">--</div>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px;">
            <div class="info-card fam">
                <span class="card-label" style="color:var(--family);">🏡 家人與生活指引 (深度版)</span>
                <div id="rFam" class="card-content">--</div>
            </div>
            <div class="info-card work">
                <span class="card-label" style="color:var(--work);">💼 事業與決策建議</span>
                <div id="rWork" class="card-content">--</div>
            </div>
        </div>

        <div class="visual-box">
            <div style="text-align:center;">
                <div style="font-size:0.8rem; margin-bottom:5px; color:#888;">本卦 (點擊變爻)</div>
                <div id="rLines" class="hex-col"></div>
            </div>
            <div style="display:flex; align-items:center; font-size:2rem; color:#ddd;">➜</div>
            <div style="text-align:center;">
                <div style="font-size:0.8rem; margin-bottom:5px; color:#888;">趨勢 (之卦)</div>
                <div id="rZhiLines" class="hex-col" style="pointer-events:none; opacity:0.6;"></div>
                <div id="rZhiName" style="font-weight:bold; color:var(--gold); margin-top:10px;"></div>
            </div>
        </div>

        <div class="yao-list">
            <div style="padding:15px; background:#fafafa; border-bottom:1px solid #eee; font-weight:bold; color:#666;">
                📜 六爻詳解 (動爻為變數關鍵)
            </div>
            <div id="rYaoList"></div>
        </div>
        <div style="height: 60px;"></div>
    </div>

    <div id="viewLibrary" class="page-section">
        <div class="nav-bar">
            <button class="btn-back" onclick="goHome()">← 首頁</button>
            <div style="font-weight:bold; font-size:1.2rem;">全卦象索引</div>
            <div style="width:80px;"></div>
        </div>

        <input type="text" id="libSearch" class="search-input" placeholder="搜尋卦名或編號 (例如: 1, 家人)...">
        <div id="libGrid" class="library-grid"></div>
    </div>

</div>

    let currentStep = 0;

    // 通用函數：取得爻名
    function getYaoName(idx, val) {
        const p = ["初","二","三","四","五","上"][idx];
        const t = val===1?"九":"六";
        return idx===0?`初${t}` : (idx===5?`上${t}` : `${t}${p}`);
    }

    // 通用函數：取得卦象符號
    function getHexSymbol(id) {
        return String.fromCodePoint(0x4DC0 + id - 1);
    }

    // 格式化卦名：前兩字靛藍，後續字紅色
    function formatGuaName(name) {
        if (!name) return "";
        const firstTwo = name.slice(0, 2);
        const rest = name.slice(2);
        return `<span class="indigo-char">${firstTwo}</span><span class="red-char">${rest}</span>`;
    }

    // 產生迷你卦圖 HTML
    function getMiniHexHTML(binaryCodeStr) {
        let html = '<div class="mini-hex-container">';
        for (let i = 0; i < 6; i++) {
            const type = binaryCodeStr[i] === '1' ? 'yang' : 'yin';
            html += `<div class="mini-line ${type}"></div>`;
        }
        html += '</div>';
        return html;
    }

    // 提問引導
    function setIntent(text) {

        document.querySelectorAll('.chip').forEach(el => el.classList.remove('selected'));
        event.target.classList.add('selected');

    // 頁面導航
    function switchPage(id) {
        document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');

    function startDivination() {
        currentStep = 0; hexCode = []; moveArr = [];

        document.getElementById('tossResultText').textContent = "";
        document.getElementById('progressBar').style.width = "0%";
        updateStepText();
        switchPage('viewDivination');
    }

    function toss() {
        if(currentStep >= 6) return;

        const btn = document.getElementById('tossBtn');
        btn.disabled = true;

        const coins = document.querySelectorAll('.coin');
        coins.forEach(c => c.classList.add('flipping'));

        setTimeout(() => {
            coins.forEach(c => c.classList.remove('flipping'));
            
            const r1 = Math.random()>0.5?3:2;
            const r2 = Math.random()>0.5?3:2;
            const r3 = Math.random()>0.5?3:2;
            const sum = r1 + r2 + r3;

            renderCoins(r1, r2, r3);

            let val, move, txt;
            if(sum===6) { val=0; move=true; txt="老陰 (變爻 ✖)"; }
            else if(sum===9) { val=1; move=true; txt="老陽 (變爻 ⭕)"; }
            else if(sum===7) { val=1; move=false; txt="少陽"; }
            else { val=0; move=false; txt="少陰"; }

            hexCode.push(val);
            moveArr.push(move);
            
            document.getElementById('tossResultText').textContent = `結果：${txt}`;
            currentStep++;
            document.getElementById('progressBar').style.width = `${(currentStep/6)*100}%`;

            if(currentStep < 6) {
                updateStepText();
                btn.disabled = false;
            } else {
                setTimeout(() => {
                    generateAndShowResult(hexCode, moveArr);
                }, 1000);
            }

        }, 800);
    }

    function updateStepText() {
        document.getElementById('stepText').textContent = `第 ${currentStep+1} 爻 (由下而上)`;
    }

    function renderCoins(r1, r2, r3) {
        const els = document.querySelectorAll('.coin');
        [r1, r2, r3].forEach((v, i) => {
            els[i].className = v===3 ? 'coin tail' : 'coin';
            els[i].textContent = v===3 ? '花' : '字';
        });
    }

    function resetCoins() {
        document.querySelectorAll('.coin').forEach(c => { c.className='coin'; c.textContent='?'; });
    }

    function generateAndShowResult(code, moves) {
        const key = code.map(String).join('');
        const base = hexMap[key];

        if(!base) { alert("發生錯誤，請重試"); goHome(); return; }

        let detail = detailedDB[base.id.toString()];
        
        if(!detail) {
            // 智慧生成通用資料
            detail = {
                gen: `<strong style='color:var(--accent);'>【${base.tag}】 ${base.stars}</strong><br>您卜得的是【${base.n}】。卦象特質為「${base.s}」。這是一個需要根據其特性來應對的時刻。`,

                fam: `家庭相處上，建議參考「${base.s}」的智慧。保持溝通順暢，以和為貴，共同面對當前的狀況。`,

                    tip: "審慎評估"
                }))

        } else {
            // 詳細資料也要加上吉凶標頭
            detail.gen = `<strong style='color:var(--accent);'>【${base.tag}】 ${base.stars}</strong><br>` + detail.gen;

        const finalData = { ...base, ...detail, c: code };
        renderDetail(finalData, moves);
        switchPage('viewResult');

    function renderDetail(data, moves) {
        currentGuaData = data;
        hexCode = data.c;
        moveArr = moves;

        document.getElementById('rId').textContent = `第 ${data.id} 卦`;
        
        // 渲染吉凶標籤
        const tagBox = document.getElementById('rTags');
        tagBox.innerHTML = `<span class="luck-badge">${data.stars} ${data.tag}</span>`;

        // 標題與結構
        const symbol = getHexSymbol(data.id);
        document.getElementById('rTitle').innerHTML = 
            `${data.id}. <span class="hex-symbol-lg">${symbol}</span> ${formatGuaName(data.n)}`;
        document.getElementById('rSub').textContent = data.s;

        const lowerCode = data.c.slice(0,3).join('');
        const upperCode = data.c.slice(3,6).join('');
        
        const lowerT = trigramMap[lowerCode];
        const upperT = trigramMap[upperCode];

        document.getElementById('lowerIcon').textContent = lowerT.s;
        document.getElementById('lowerName').textContent = `下卦(${lowerT.n})`;
        document.getElementById('upperIcon').textContent = upperT.s;
        document.getElementById('upperName').textContent = `上卦(${upperT.n})`;

        document.getElementById('rGen').innerHTML = data.gen;
        document.getElementById('rWork').innerHTML = data.work;
        document.getElementById('rFam').innerHTML = data.fam;

        renderInteractiveHex();

    function renderInteractiveHex() {
        const rLines = document.getElementById('rLines');
        const rZhiLines = document.getElementById('rZhiLines');
        const rYaoList = document.getElementById('rYaoList');

        rLines.innerHTML = '';
        rZhiLines.innerHTML = '';
        rYaoList.innerHTML = '';

        let zhiCode = [...hexCode];
        const hasMove = moveArr.includes(true);

        for(let i=5; i>=0; i--) {
            const isMove = moveArr[i];
            const type = hexCode[i]===1 ? 'yang' : 'yin';
            const line = document.createElement('div');
            line.className = `line ${type} ${isMove?'moving':''}`;
            line.onclick = () => {
                moveArr[i] = !moveArr[i];
                renderInteractiveHex();
            };
            rLines.appendChild(line);

            if(isMove) zhiCode[i] = zhiCode[i]===1 ? 0 : 1;

            const yaoRow = document.createElement('div');
            yaoRow.className = `yao-item ${isMove ? 'active' : ''}`;
            if(hasMove && !isMove) yaoRow.style.opacity = '0.5';

            const yaoName = getYaoName(i, hexCode[i]);
            const yContent = currentGuaData.yaos[i];

            yaoRow.innerHTML = `
                <span class="yao-title">${yaoName} ${isMove?'(動爻)':''}</span>
                <div style="color:#555;">${yContent.v}</div>
                <div class="yao-tip">💡 ${yContent.tip}</div>
            `;
            rYaoList.appendChild(yaoRow);
        }

        for(let i=5; i>=0; i--) {
            const type = zhiCode[i]===1 ? 'yang' : 'yin';
            const line = document.createElement('div');
            line.className = `line ${type}`;
            rZhiLines.appendChild(line);
        }

        if(hasMove) {
            const zKey = zhiCode.map(String).join('');
            const zData = hexMap[zKey];
            document.getElementById('rZhiName').innerHTML = zData ? `變為：${formatGuaName(zData.n)}` : "未知變卦";
        } else {
            document.getElementById('rZhiName').textContent = "無變爻";
        }
    }

    // ------------------------------------------------
    // 瀏覽列表 (Library)

    function showLibrary() {
        const grid = document.getElementById('libGrid');
        grid.innerHTML = '';

        // 1. 將物件轉為陣列並排序 (Sort by ID 1-64)
        const sortedHexagrams = Object.values(hexMap).sort((a, b) => a.id - b.id);

        // 2. 渲染
        sortedHexagrams.forEach(base => {
            const symbol = getHexSymbol(base.id);
            // 找回 key
            const key = Object.keys(hexMap).find(k => hexMap[k].id === base.id);
            const miniHexHTML = getMiniHexHTML(key);

            const item = document.createElement('div');
            item.className = 'lib-item';
            
            item.innerHTML = `
                ${miniHexHTML}
                <div class="lib-name">
                    ${base.id}. <span class="hex-symbol-sm">${symbol}</span> ${formatGuaName(base.n)}
                </div>
                <div style="font-size:0.8rem; color:#888;">${base.s} (${base.tag})</div>
            `;
            
            item.onclick = () => {
                const code = key.split('').map(Number);
                generateAndShowResult(code, [false,false,false,false,false,false]);
            };
            grid.appendChild(item);
        });

        switchPage('viewLibrary');
    }

        items.forEach(item => {
            const text = item.innerText;
            item.style.display = text.includes(v) ? 'block' : 'none';
        });
    });

</script>
